server {
    listen 80;
    listen [::]:80;

    server_name tools.malmaz.com;

    client_max_body_size 10m;

    # ESP32: bez przekierowania na HTTPS, dopóki firmware używa zwykłego HTTP.
    location /gate-control/api/device/ {
        proxy_pass http://127.0.0.1:8010/api/device/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /gate-control;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    # HTTP zostaje dostępne przejściowo.
    # Docelowo po przerobieniu ESP32 na HTTPS można dać redirect dla reszty.
    location /gate-control/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /gate-control;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    location = /gate-control {
        return 301 /gate-control/;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name tools.malmaz.com;

    client_max_body_size 10m;

    ssl_certificate /etc/letsencrypt/live/tools.malmaz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tools.malmaz.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /gate-control/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /gate-control;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    location = /gate-control {
        return 301 /gate-control/;
    }
}
